name: Collect Static Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      # JQUANTS_API_KEY シークレットが設定されていれば jquants モード、なければ csv (50銘柄サンプル)
      DATA_PROVIDER: ${{ secrets.JQUANTS_API_KEY != '' && 'jquants' || 'csv' }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Generate static JSON
        run: pnpm exec tsx scripts/collect-static.ts

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update static data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
