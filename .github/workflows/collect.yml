name: Collect Static Data

on:
  schedule:
    # 月・木 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      # J-Quants credentials: set in repo secrets to switch to real data
      # If both secrets are set, use jquants; otherwise use csv (safe default)
      DATA_PROVIDER: ${{ secrets.JQUANTS_MAIL_ADDRESS != '' && secrets.JQUANTS_PASSWORD != '' && 'jquants' || 'csv' }}
      JQUANTS_MAIL_ADDRESS: ${{ secrets.JQUANTS_MAIL_ADDRESS }}
      JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
      JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static JSON
        run: DATA_PROVIDER=csv pnpm exec tsx scripts/collect-static.ts

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update static data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
